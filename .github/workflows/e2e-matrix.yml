name: E2E Cross-DB Matrix

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  e2e-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Run cross-database E2E matrix script
        shell: pwsh
        run: ./scripts/run-e2e-matrix.ps1
