services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dbmigrator-postgres
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass123
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Oracle Database Free (replaces deprecated oracle-xe)
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: dbmigrator-oracle
    environment:
      ORACLE_PASSWORD: oraclepass123
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./init-scripts/oracle-init.sql:/container-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    shm_size: 1gb

  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dbmigrator-sqlserver
    environment:
      MSSQL_SA_PASSWORD: SqlServer@123
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./init-scripts/sqlserver-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./init-scripts/sqlserver-docker-entrypoint.sh:/sqlserver-docker-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/sqlserver-docker-entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  postgres_data:
  oracle_data:
  sqlserver_data:

networks:
  default:
    name: dbmigrator-network
